name: CI

on:
  push:
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: ruff check
        run: uvx ruff check src/

      - name: ruff format
        run: uvx ruff format --check src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y bowtie2 bwa minimap2 samtools

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: uv sync --extra dev

      - name: Check installed package
        run: uv run hicstuff --version

      - name: Run tests
        run: uv run pytest --cov=hicstuff --cov-report=term-missing --cov-report=xml -v
        continue-on-error: ${{ matrix.python-version == '3.13' }}

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
